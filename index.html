    if(existing.find(u=>u.name.toLowerCase()===name.toLowerCase())){addErr.textContent='Tên đã tồn tại!';return;}
    addBtn.disabled=true;addBtn.textContent='Đang tạo...';
    const pinHash=await hashPin(pin);
    const newUser={id:'u_'+Date.now(),name,role,pinHash};
    saveUsers([...existing,newUser]);
    nameInp.value='';pinInp.value='';addErr.textContent='';
    addBtn.disabled=false;addBtn.textContent='+ Thêm';
    renderList();
  }},['+ Thêm']);

  const modalEl=div({className:'modal',style:{maxWidth:420}},[
    div({className:'modal-header'},[
      div({className:'modal-title'},['👥 Quản lý tài khoản']),
      btn({className:'modal-close',onClick:()=>setState({modal:null})},['×']),
    ]),
    listEl,
    div({style:{borderTop:'1px solid var(--border)',paddingTop:16}},[
      div({style:{fontWeight:600,fontSize:13,marginBottom:10,color:'var(--text1)'}},[' Thêm tài khoản mới']),
      nameInp,pinInp,roleSelect,addErr,addBtn,
    ]),
  ]);
  showModal(modalEl);
}

  const submitBtn=btn({className:'btn btn-primary',style:{width:'100%',padding:'12px'},onClick:async()=>{

function showLoginScreen(users){
  // Sync render - không fetch gì cả
  const app=document.getElementById('app');
  app.innerHTML='';

  const noUsers=users.length===0;
  if(noUsers){setTimeout(()=>renderFirstRunSetup(),0);return;}

  let selectedUser=null;
  let pinVal='';
  const errorEl=document.createElement('div');
  errorEl.style.cssText='color:#ef4444;font-size:13px;text-align:center;min-height:20px;margin-bottom:4px';

  function updateDots(){
    for(let i=0;i<4;i++){
      const d=document.getElementById('dot_'+i);
      if(d)d.style.background=pinVal.length>i?'var(--accent)':'#e5e7eb';
    }
  }

  async function submitPin(){
    if(!selectedUser){errorEl.textContent='Chọn tên trước!';return;}
    if(pinVal.length<4){errorEl.textContent='Nhập đủ 4 số!';return;}
    const hashed=await hashPin(pinVal);
    if(hashed!==selectedUser.pinHash){
      errorEl.textContent='PIN không đúng!';
      pinVal='';updateDots();return;
    }
    saveCurrentUser(selectedUser);
    extendSession();
    S.currentUser=selectedUser;
    render();
  }

  function pressKey(k){
    if(k==='del'){pinVal=pinVal.slice(0,-1);}
    else if(pinVal.length<4){pinVal+=k;}
    updateDots();
    errorEl.textContent='';
    if(pinVal.length===4)setTimeout(submitPin,100);
  }

  // Dots
  const dotsRow=document.createElement('div');
  dotsRow.style.cssText='display:flex;gap:10px;justify-content:center;margin:16px 0';
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.id='dot_'+i;
    d.style.cssText='width:14px;height:14px;border-radius:50%;background:#e5e7eb;transition:background .1s';
    dotsRow.appendChild(d);
  }

  // Numpad
  const numpad=document.createElement('div');
  numpad.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto';
  [1,2,3,4,5,6,7,8,9,'',0,'del'].forEach(k=>{
    if(k===''){numpad.appendChild(document.createElement('div'));return;}
    const b=document.createElement('button');
    b.textContent=k==='del'?'⌫':String(k);
    b.style.cssText=`padding:16px;font-size:${k==='del'?18:20}px;font-weight:600;background:white;border:1px solid var(--border);border-radius:var(--r12);cursor:pointer;box-shadow:var(--s1);color:${k==='del'?'#ef4444':'var(--text1)'}`;
    b.onclick=()=>pressKey(String(k));
    numpad.appendChild(b);
  });

  // User list
  const userList=document.createElement('div');
  userList.style.cssText='display:flex;flex-direction:column;gap:6px;margin-bottom:16px';
  users.forEach(u=>{
    const ub=document.createElement('button');
    ub.className='user-btn';
    ub.style.cssText='padding:10px 14px;border-radius:var(--r8);border:2px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .1s;text-align:left;width:100%';
    const avatar=document.createElement('div');
    avatar.style.cssText='width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:15px;flex-shrink:0';
    avatar.textContent=u.name[0].toUpperCase();
    const info=document.createElement('div');
    info.innerHTML=`<div style="font-weight:600;font-size:14px;color:var(--text1)">${u.name}</div><div style="font-size:12px;color:var(--text3)">${u.role==='admin'?'👑 Admin':'👤 Thành viên'}</div>`;
    ub.appendChild(avatar);ub.appendChild(info);
    ub.onclick=()=>{
      selectedUser=u;
      document.querySelectorAll('.user-btn').forEach(b=>Object.assign(b.style,{borderColor:'var(--border)',background:'white'}));
      Object.assign(ub.style,{borderColor:'var(--accent)',background:'var(--accent-bg)'});
      pinVal='';updateDots();errorEl.textContent='';
    };
    userList.appendChild(ub);
  });

  // Assemble
  const card=document.createElement('div');
  card.style.cssText='background:white;border-radius:var(--r16);padding:32px 28px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:100%;max-width:360px';
  const logo=document.createElement('div');
  logo.style.cssText='text-align:center;margin-bottom:24px';
  logo.innerHTML=`<div style="width:56px;height:56px;border-radius:16px;background:var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:white;font-weight:800;font-size:22px">TT</div><div style="font-weight:700;font-size:20px;color:var(--text1)">Task Tracker AI</div><div style="font-size:13px;color:var(--text3);margin-top:4px">Chọn tên và nhập PIN</div>`;
  card.appendChild(logo);
  card.appendChild(userList);
  card.appendChild(dotsRow);
  card.appendChild(errorEl);
  card.appendChild(numpad);
  const wrap=document.createElement('div');
  wrap.style.cssText='min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px';
  wrap.appendChild(card);
  app.appendChild(wrap);
}

// ─── Report View ──────────────────────────────────────────────────────────────
function renderReportView(mobile){
  const wrap=div({style:{padding:mobile?'12px':'20px',maxWidth:900,margin:'0 auto'}});
  const workerUrl=(getSyncCfg()||{}).workerUrl;

  // Header
  wrap.appendChild(div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}},[
    div({style:{fontWeight:700,fontSize:18,color:'var(--text1)'}},[' 📊 Báo cáo']),
    div({style:{fontSize:12,color:'var(--text3)'}},[new Date().toLocaleDateString('vi-VN')]),
  ]));

  if(!workerUrl){
    wrap.appendChild(div({style:{textAlign:'center',padding:40,color:'var(--text3)'}},[' Cần kết nối Cloud Sync để xem báo cáo']));
    return wrap;
  }

  // Loading state
  const loadingEl=div({style:{textAlign:'center',padding:40,color:'var(--text3)'}},[' Đang tải...']);
  wrap.appendChild(loadingEl);

  // Fetch report data
  Promise.all([
    fetch(workerUrl+'/report?type=summary').then(r=>r.json()),
    fetch(workerUrl+'/report?type=by_user').then(r=>r.json()),
    fetch(workerUrl+'/report?type=by_category').then(r=>r.json()),
  ]).then(([summary, byUser, byCat])=>{
    loadingEl.remove();

    // ── Summary cards ──
    const summaryGrid=div({style:{display:'grid',gridTemplateColumns:mobile?'repeat(2,1fr)':'repeat(4,1fr)',gap:12,marginBottom:24}});
    const cards=[
      {label:'Tổng task',value:summary.total||0,icon:'📋',color:'#4F46E5',bg:'#EEF2FF'},
      {label:'Hoàn thành',value:summary.done||0,icon:'✅',color:'#059669',bg:'#ECFDF5'},
      {label:'Quá hạn',value:summary.overdue||0,icon:'🔴',color:'#DC2626',bg:'#FEF2F2'},
      {label:'Đã lưu trữ',value:summary.archived||0,icon:'📦',color:'#D97706',bg:'#FFFBEB'},
    ];
    cards.forEach(c=>{
      summaryGrid.appendChild(div({style:{background:c.bg,borderRadius:'var(--r12)',padding:'16px',border:'1px solid '+c.color+'30'}},[ 
        div({style:{fontSize:24,marginBottom:4}},[c.icon]),
        div({style:{fontSize:28,fontWeight:700,color:c.color,lineHeight:1}},[String(c.value)]),
        div({style:{fontSize:12,color:'var(--text2)',marginTop:4}},[c.label]),
      ]));
    });
    wrap.appendChild(summaryGrid);

    // ── By status ──
    if(summary.byStatus&&summary.byStatus.length){
      const statusMap={todo:'📋 Cần làm',inprogress:'⚡ Đang làm',done:'✅ Hoàn thành'};
      const statusColors={todo:'#6B7280',inprogress:'#3B82F6',done:'#10B981'};
      const statusSection=div({style:{background:'white',borderRadius:'var(--r12)',padding:16,marginBottom:16,border:'1px solid var(--border)',boxShadow:'var(--s1)'}});
      statusSection.appendChild(div({style:{fontWeight:600,fontSize:14,marginBottom:12,color:'var(--text1)'}},[' Theo trạng thái']));
      const total=summary.byStatus.reduce((s,r)=>s+(r.n||0),0)||1;
      summary.byStatus.forEach(r=>{
        const pct=Math.round((r.n||0)/total*100);
        const row=div({style:{marginBottom:10}});
        row.appendChild(div({style:{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:4}},[
          span({style:{color:'var(--text1)',fontWeight:500}},[statusMap[r.status]||r.status]),
          span({style:{color:'var(--text2)'}},[r.n+' task ('+pct+'%)']),
        ]));
        const bar=div({style:{height:8,borderRadius:4,background:'#F3F4F6',overflow:'hidden'}});
        bar.appendChild(div({style:{height:'100%',width:pct+'%',background:statusColors[r.status]||'#6B7280',borderRadius:4,transition:'width .5s'}}));
        row.appendChild(bar);
        statusSection.appendChild(row);
      });
      wrap.appendChild(statusSection);
    }

    // ── By user ──
    if(byUser.data&&byUser.data.length){
      const userSection=div({style:{background:'white',borderRadius:'var(--r12)',padding:16,marginBottom:16,border:'1px solid var(--border)',boxShadow:'var(--s1)'}});
      userSection.appendChild(div({style:{fontWeight:600,fontSize:14,marginBottom:12,color:'var(--text1)'}},[' Theo nhân viên']));
      const maxTotal=Math.max(...byUser.data.map(r=>r.total||0))||1;
      byUser.data.forEach(r=>{
        if(!r.assignee)return;
        const pctDone=r.total?Math.round((r.done||0)/r.total*100):0;
        const row=div({style:{display:'flex',alignItems:'center',gap:12,marginBottom:12,padding:'8px 0',borderBottom:'1px solid var(--border)'}});
        // Avatar
        row.appendChild(div({style:{width:36,height:36,borderRadius:'50%',background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:13,flexShrink:0}},[r.assignee[0].toUpperCase()]));
        const info=div({style:{flex:1,minWidth:0}});
        info.appendChild(div({style:{fontWeight:600,fontSize:13,color:'var(--text1)',marginBottom:4}},[r.assignee]));
        const barWrap=div({style:{height:6,borderRadius:3,background:'#F3F4F6',overflow:'hidden',marginBottom:4}});
        barWrap.appendChild(div({style:{height:'100%',width:Math.round((r.total||0)/maxTotal*100)+'%',background:'var(--accent)',borderRadius:3}}));
        info.appendChild(barWrap);
        info.appendChild(div({style:{fontSize:11,color:'var(--text3)'}},[r.total+' task · '+r.done+' xong · TB '+Math.round(r.avg_progress||0)+'%']));
        row.appendChild(info);
        row.appendChild(div({style:{fontSize:16,fontWeight:700,color:pctDone>=80?'#10B981':pctDone>=50?'#F59E0B':'#EF4444',flexShrink:0}},[pctDone+'%']));
        userSection.appendChild(row);
      });
      wrap.appendChild(userSection);
    }

    // ── By category ──
    if(byCat.data&&byCat.data.length){
      const catSection=div({style:{background:'white',borderRadius:'var(--r12)',padding:16,marginBottom:16,border:'1px solid var(--border)',boxShadow:'var(--s1)'}});
      catSection.appendChild(div({style:{fontWeight:600,fontSize:14,marginBottom:12,color:'var(--text1)'}},[' Theo category']));
      byCat.data.forEach(r=>{
        const pctDone=r.total?Math.round((r.done||0)/r.total*100):0;
        const row=div({style:{display:'flex',alignItems:'center',gap:12,marginBottom:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}});
        row.appendChild(div({style:{fontSize:24,flexShrink:0}},[r.icon||'📋']));
        const info=div({style:{flex:1}});
        info.appendChild(div({style:{fontWeight:600,fontSize:13,color:'var(--text1)',marginBottom:2}},[r.name]));
        info.appendChild(div({style:{fontSize:11,color:'var(--text3)'}},[r.total+' task · '+r.done+' xong · TB '+Math.round(r.avg_progress||0)+'%']));
        row.appendChild(info);
        row.appendChild(div({style:{fontSize:14,fontWeight:700,color:pctDone>=80?'#10B981':pctDone>=50?'#F59E0B':'#EF4444'}},[pctDone+'%']));
        catSection.appendChild(row);
      });
      wrap.appendChild(catSection);
    }

    // ── Payment summary ──
    const payments=getPayments();
    if(payments.length){
      const pending=payments.filter(p=>p.status==='pending');
      const approved=payments.filter(p=>p.status==='approved');
      const paid=payments.filter(p=>p.status==='paid');
      const totalPending=pending.reduce((s,p)=>s+Number(p.amount||0),0);
      const totalPaid=paid.reduce((s,p)=>s+Number(p.amount||0),0);

      const paySection=div({style:{background:'white',borderRadius:'var(--r12)',padding:16,marginBottom:16,border:'1px solid var(--border)',boxShadow:'var(--s1)'}});
      paySection.appendChild(div({style:{fontWeight:600,fontSize:14,marginBottom:12,color:'var(--text1)'}},[' Thanh toán']));
      const payGrid=div({style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}});
      [
        {label:'Chờ duyệt',value:pending.length,amount:totalPending,color:'#D97706',bg:'#FFFBEB'},
        {label:'Đã duyệt',value:approved.length,amount:approved.reduce((s,p)=>s+Number(p.amount||0),0),color:'#059669',bg:'#ECFDF5'},
        {label:'Đã thanh toán',value:paid.length,amount:totalPaid,color:'#4F46E5',bg:'#EEF2FF'},
      ].forEach(c=>{
        payGrid.appendChild(div({style:{background:c.bg,borderRadius:8,padding:12,textAlign:'center'}},[ 
          div({style:{fontSize:20,fontWeight:700,color:c.color}},[String(c.value)]),
          div({style:{fontSize:10,color:'var(--text2)',margin:'2px 0'}},[c.label]),
          div({style:{fontSize:11,fontWeight:600,color:c.color}},[formatMoney(c.amount)]),
        ]));
      });
      paySection.appendChild(payGrid);
      wrap.appendChild(paySection);
    }

  }).catch(e=>{
    loadingEl.textContent='Lỗi tải báo cáo: '+e.message;
  });

  return wrap;
}

// ─── Export / Import ────────────────────────────────────────────────────────
function exportData(){
  const data={tasks:S.tasks,categories:S.categories,payments:getPayments(),payMembers:getPayMembers(),payTgCfg:getPayTgCfg(),exportedAt:new Date().toISOString()};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='tasktracker_'+new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Đã xuất file backup!');
}

function importData(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=async e=>{
    const file=e.target.files[0];
    if(!file)return;
    try{
      const text=await file.text();
      const data=JSON.parse(text);
      if(!data.tasks||!data.categories){showToast('❌ File không hợp lệ',false);return;}
      setState({tasks:data.tasks,categories:data.categories});
      lsSet('tt_tasks',data.tasks);
      lsSet('tt_categories',data.categories);
      if(Array.isArray(data.payments))lsSet('tt_payments',data.payments);
      if(Array.isArray(data.payMembers))lsSet('tt_pay_members',data.payMembers);
      if(data.payTgCfg&&data.payTgCfg.token)lsSet('tt_pay_tg_cfg',data.payTgCfg);
      showToast('✅ Đã import '+data.tasks.length+' task'+(data.payments?' + '+data.payments.length+' đề xuất':'')+'!');
      render();
    }catch(e){showToast('❌ Lỗi đọc file: '+e.message,false);}
  };
  input.click();
}

async function handleSaveTask(form,isNew){
  // Sync progress <-> status
  if(form.status==='done')form={...form,progress:100};
  else if((form.progress||0)===100&&form.status==='done')form={...form,progress:100};
  const d=todayStr();
  const cat=(S.categories||[]).find(c=>c.id===form.categoryId);
  const catProtected=!!(cat&&cat.passwordHash);
  const dlText=form.deadline?'\n⏰ Deadline: '+formatDate(form.deadline):'';
  const catText=cat?'\n🗂 '+cat.icon+' '+cat.name:'';
  if(isNew){
    const t={...form,id:Date.now(),date:d};
    saveTasks([...S.tasks,t]);
    showToast('✅ Đã tạo công việc mới!');
    notifyTask(t,cat,'📌 <b>Task mới được tạo</b>');
  }else{
    saveTasks(S.tasks.map(t=>t.id===form.id?{...form}:t));
    showToast('✅ Đã cập nhật!');
    notifyTask(form,cat,'✏️ <b>Task được cập nhật</b>');
  }
  setState({modal:null,modalData:null});
}

function handleDeleteTask(id){
  const t=S.tasks.find(x=>x.id===id);
  saveTasks(S.tasks.filter(x=>x.id!==id));
  showToast('🗑 Đã xóa công việc');
  const delCat=(S.categories||[]).find(c=>c.id===t.categoryId);
  if(t)notify('🗑️ <b>Đã xóa</b>\n🔖 '+t.title,delCat);
  setState({modal:null,modalData:null});
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function showModal(content){
  // Remove any existing overlays first to prevent stacking
  document.querySelectorAll('.overlay-bg').forEach(el=>el.remove());
  const bg=div({className:'overlay-bg'},[content]);
  bg.addEventListener('click',e=>{if(e.target===bg)setState({modal:null,modalData:null})});
  document.getElementById('app').appendChild(bg);
}
function makeField(label,children){
  return div({className:'field'},[el('label',{},[label]),...children.filter(Boolean)]);
}
function makeSelect(name,value,options,onChange){
  const s=el('select',{className:'input',style:{background:'white'}},options.map(([v,l])=>el('option',{value:v,selected:v===value},[l])));
  s.addEventListener('change',e=>onChange(e.target.value));
  return s;
}

function renderSyncModal(){
  const cfg=getSyncCfg()||{workerUrl:''};
  const hasConfig=!!(cfg.workerUrl);
  const WORKER_URL='https://sepay-webhook.klinh-maihoang.workers.dev';

  const workerUrlInp=inp({className:'input',value:cfg.workerUrl||WORKER_URL,placeholder:'https://your-worker.workers.dev',style:{fontFamily:'monospace',fontSize:12}});

  const statusDiv=div({style:{fontSize:12,padding:'8px 12px',borderRadius:'var(--r8)',display:'none',marginTop:8,fontWeight:500}});
  function setStatus(msg,type){
    statusDiv.textContent=msg;
    statusDiv.style.display='block';
    const colors={ok:{bg:'#ECFDF5',c:'#065f46',border:'#A7F3D0'},error:{bg:'#FEF2F2',c:'#991B1B',border:'#FECACA'},info:{bg:'#EFF6FF',c:'#1e40af',border:'#BFDBFE'}};
    const col=colors[type]||colors.info;
    Object.assign(statusDiv.style,{background:col.bg,color:col.c,border:'1px solid '+col.border});
  }

  const connectBtn=btn({className:'btn btn-primary',style:{flex:1},onClick:async()=>{
    const workerUrl=workerUrlInp.value.trim().replace(/\/$/,'');
    if(!workerUrl){setStatus('\u274C Nhập Worker URL trước!','error');return;}
    connectBtn.textContent='Đang kết nối...';connectBtn.disabled=true;
    try{
      setStatus('Đang kiểm tra kết nối...','info');
      const testRes=await fetch(workerUrl);
      if(!testRes.ok)throw new Error('Worker không phản hồi');
      lsSet('tt_sync_cfg',{workerUrl});
      const cloudRes=await fetch(workerUrl+'/data');
      const cloudData=await cloudRes.json();
      const cloudCount=(cloudData.tasks||[]).length;
      const localCount=(S.tasks||[]).length;
      connectBtn.textContent='Đã kết nối';
      if(cloudCount>0&&localCount>0){
        // Cả hai có data — hỏi user
        statusDiv.innerHTML='';
        statusDiv.style.display='block';
        Object.assign(statusDiv.style,{background:'#EFF6FF',color:'#1e40af',border:'1px solid #BFDBFE'});
        const info=document.createElement('div');
        info.style.cssText='font-size:12px;font-weight:600;margin-bottom:8px';
        info.textContent='Cloud co '+cloudCount+' task | Thiet bi nay co '+localCount+' task. Dung data nao?';

        bCloud.textContent='Lay tu cloud ('+cloudCount+')';
        bCloud.onclick=async()=>{bCloud.disabled=true;bLocal.disabled=true;setStatus('Dang lay tu cloud...','info');await syncPull();setStatus('Da lay '+( S.tasks||[]).length+' task tu cloud.','ok');};

        bLocal.className='btn btn-primary';bLocal.style.flex='1';bLocal.style.fontSize='12px';

        row.appendChild(bCloud);row.appendChild(bLocal);
        statusDiv.appendChild(info);statusDiv.appendChild(row);
      } else if(localCount>0&&cloudCount===0){
        await syncPush();
        setStatus('Da day '+localCount+' task len cloud.','ok');
      } else {
        await syncPull();
        setStatus('Da lay '+( S.tasks||[]).length+' task tu cloud.','ok');

function renderReminderModal(){
  const{tasks}=S.modalData||{tasks:[]};
  if(!tasks||!tasks.length){setState({modal:null,modalData:null});return;}
  const isDue=tasks.some(t=>t.type==='due');
  const isWarn=tasks.some(t=>t.type==='warn15');

  // Try browser notification
  if(isDue&&'Notification' in window&&Notification.permission==='granted'){
    tasks.filter(t=>t.type==='due').forEach(t=>{
      new Notification('🚨 Đến deadline!',{body:t.title+(t.assignee?' — '+t.assignee:''),icon:'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚨</text></svg>'});
    });
  }

  const accentColor=isDue?'#DC2626':'#D97706';
  const bgColor=isDue?'#FEF2F2':'#FFFBEB';
  const borderColor=isDue?'#FECACA':'#FDE68A';
  const icon=isDue?'🚨':'⏰';
  const title=isDue?'ĐẾN DEADLINE!':'Sắp đến deadline — còn 15 phút!';

  const taskCards=tasks.map(t=>{
    const pct=t.progress||0;
    const filled=Math.round(pct/10);
    const progBar='█'.repeat(filled)+'░'.repeat(10-filled);
    const catColor=t.cat?t.cat.color:'#6366f1';
    return div({style:{background:'white',borderRadius:'var(--r12)',padding:'12px 14px',marginBottom:8,borderLeft:'3px solid '+catColor,border:'1px solid #e5e7eb',borderLeftColor:catColor}},[
      div({style:{fontSize:13,fontWeight:700,color:'var(--text1)',marginBottom:6}},[t.title]),
      div({style:{display:'flex',flexWrap:'wrap',gap:6,fontSize:11,color:'var(--text2)'}},[
        t.assignee?span({style:{background:'#f3f4f6',padding:'2px 7px',borderRadius:4}},[' 👤 '+t.assignee]):null,
        t.cat?span({style:{background:catColor+'15',color:catColor,padding:'2px 7px',borderRadius:4}},[t.cat.icon+' '+t.cat.name]):null,
        span({style:{background:'#f3f4f6',padding:'2px 7px',borderRadius:4}},['🕐 '+formatDate(t.deadline)]),
      ]),
      div({style:{marginTop:8}},[
        div({style:{display:'flex',alignItems:'center',gap:6}},[
          div({style:{flex:1,height:5,background:'#e5e7eb',borderRadius:4,overflow:'hidden'}},[
            div({style:{height:'100%',width:pct+'%',background:pct>=100?'#059669':pct>=60?'#2563EB':pct>=30?'#D97706':'#94A3B8',borderRadius:4}})
          ]),
          span({style:{fontSize:11,fontWeight:700,color:'var(--text2)',minWidth:32}},[pct+'%']),
        ]),
      ]),
      div({style:{display:'flex',gap:6,marginTop:8}},[
        btn({style:{flex:1,padding:'7px',borderRadius:'var(--r8)',border:'1.5px solid #e5e7eb',background:'white',fontSize:12,fontWeight:600,color:'var(--text2)'},onClick:()=>{setState({modal:null,modalData:null});openTaskModal(S.tasks.find(x=>x.id===t.id));}},[' ✏️ Cập nhật']),
      ]),
    ]);
  });

  const modalEl=div({className:'modal',style:{maxWidth:480}},[
    // Header with pulsing icon
    div({style:{textAlign:'center',padding:'4px 0 16px'}},[
      div({style:{fontSize:48,marginBottom:8,animation:isDue?'pulse 1s ease infinite':'none'}},[icon]),
      div({style:{fontSize:18,fontWeight:800,color:accentColor,letterSpacing:'-.02em'}},[title]),
      div({style:{fontSize:12,color:'var(--text3)',marginTop:4}},[tasks.length+' công việc cần chú ý']),
    ]),
    // Task list
    div({style:{background:bgColor,border:'1px solid '+borderColor,borderRadius:'var(--r12)',padding:12,marginBottom:12}},taskCards),
    // Actions
    div({style:{display:'flex',gap:8}},[
      btn({className:'btn btn-secondary',style:{flex:1},onClick:()=>setState({modal:null,modalData:null})},['Đóng']),
      isDue?btn({className:'btn btn-primary',style:{flex:1,background:accentColor},onClick:()=>{
        // Open first task for quick update
        const first=S.tasks.find(x=>x.id===tasks[0].id);
        setState({modal:null,modalData:null});
        if(first)openTaskModal(first);
      }},['⚡ Cập nhật ngay']):null,
    ]),
  ]);

  // Add pulse animation style if not already present
  if(!document.getElementById('reminder-style')){
    const style=document.createElement('style');
    style.id='reminder-style';
    style.textContent='@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}';
    document.head.appendChild(style);
  }

  // Request notification permission on first deadline
  if('Notification' in window&&Notification.permission==='default'){
    Notification.requestPermission();
  }

  showModal(modalEl);
}

function formatMoney(n){

}

function buildVietQR(bankCode,accountNo,amount,description,accountName){
  // VietQR API: https://api.vietqr.io/v2/generate
  const body={
    accountNo:accountNo,
    accountName:accountName||'',
    acqId:bankCode,
    amount:Number(amount||0),
    addInfo:description||'',
    format:'text',
    template:'compact'
  };
  return fetch('https://api.vietqr.io/v2/generate',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-client-id':'task-tracker','x-api-key':'sandbox'},
    body:JSON.stringify(body)
  }).then(r=>r.json());
}

function showPhotoLightbox(urls, startIdx=0){
  let cur=startIdx;
  const overlay=div({style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.92)',zIndex:9999,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}});

  const img=el('img',{style:{maxWidth:'90vw',maxHeight:'75vh',objectFit:'contain',borderRadius:8,boxShadow:'0 4px 32px rgba(0,0,0,0.5)'}});
  const counter=div({style:{color:'white',fontSize:13,opacity:0.8}});
  const update=()=>{img.src=urls[cur];counter.textContent=(cur+1)+' / '+urls.length;};

  const btnStyle={background:'rgba(255,255,255,0.15)',border:'none',color:'white',fontSize:22,borderRadius:8,padding:'8px 18px',cursor:'pointer'};
  const prev=btn({style:btnStyle,onClick:()=>{cur=(cur-1+urls.length)%urls.length;update();}},[' ‹ ']);
  const next=btn({style:btnStyle,onClick:()=>{cur=(cur+1)%urls.length;update();}},[' › ']);
  const close=btn({style:{...btnStyle,position:'absolute',top:16,right:16,fontSize:18},onClick:()=>overlay.remove()},['✕']);
  const openBtn=btn({style:{...btnStyle,fontSize:13},onClick:()=>window.open(urls[cur],'_blank')},['🔗 Mở tab mới']);

  const nav=div({style:{display:'flex',gap:12,alignItems:'center'}});
  if(urls.length>1){nav.appendChild(prev);nav.appendChild(counter);nav.appendChild(next);}
  nav.appendChild(openBtn);

  overlay.appendChild(close);
  overlay.appendChild(img);
  overlay.appendChild(nav);
  overlay.addEventListener('click',(e)=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
  update();
}

        else{all.forEach(p=>selectedIds.add(p.id));}
        wrap.querySelectorAll('input[type=checkbox]').forEach(cb=>{
          const id=cb.dataset.id;
          cb.checked=selectedIds.has(id);
        });
        updateBulkBar();
      }},['☑ Chọn tất cả']),
      btn({className:'btn btn-primary',style:{fontSize:13},onClick:()=>openPaymentModal(null)},[mobile?'+ Đề xuất':'+ Tạo đề xuất']),
    ]),
  ]));

  wrap.appendChild(bulkBar);

  // Payment list
  if(!payments.length){
    wrap.appendChild(div({style:{textAlign:'center',padding:'60px 0',color:'var(--text3)',fontSize:14,background:'white',borderRadius:'var(--r16)',border:'1px solid var(--border)'}},[
      div({style:{fontSize:40,marginBottom:12}},['💳']),
      div({style:{fontWeight:600,marginBottom:6}},['Chưa có đề xuất nào']),
      div({style:{fontSize:12}},['Nhấn "+ Tạo đề xuất" để bắt đầu']),
    ]));
    return wrap;
  }

  payments.slice().reverse().forEach(p=>{
    const st=PAYMENT_STATUS[p.status]||PAYMENT_STATUS.pending;
    const bank=VIET_BANKS.find(b=>b.code===p.bankCode);

    // Checkbox
    const cb=el('input',{type:'checkbox','data-id':p.id,style:{width:16,height:16,cursor:'pointer',flexShrink:0,accentColor:'#DC2626'}});
    cb.addEventListener('change',e=>{
      e.stopPropagation();
      if(cb.checked)selectedIds.add(p.id);
      else selectedIds.delete(p.id);
      updateBulkBar();
    });

    const card=div({style:{
      background:'white',borderRadius:'var(--r12)',padding:'14px 16px',marginBottom:8,
      border:'1px solid var(--border)',boxShadow:'var(--s1)',
      borderLeft:'3px solid '+st.c,display:'flex',gap:10,alignItems:'flex-start',
      cursor:'pointer',transition:'box-shadow .12s,transform .1s',
    },onClick:(e)=>{
      if(e.target.closest('input[type=checkbox]')||e.target.closest('button')||e.target.closest('a'))return;
      openPaymentDetailModal(p);
    }},[
      div({style:{paddingTop:2}}, [cb]),
      div({style:{flex:1,minWidth:0,cursor:'pointer'}},[
        div({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}},[
          div({style:{minWidth:0}},[
            div({style:{fontSize:13,fontWeight:700,color:'var(--text1)',marginBottom:2}},[p.description||'(Không có mô tả)']),
            div({style:{fontSize:11,color:'var(--text3)'}},[p.code+' · '+new Date(p.createdAt).toLocaleDateString('vi-VN')]),
          ]),
          span({style:{fontSize:11,fontWeight:600,padding:'3px 9px',borderRadius:100,background:st.bg,color:st.c,border:'1px solid '+st.border,whiteSpace:'nowrap',marginLeft:8}},[st.icon+' '+st.label]),
        ]),
        div({style:{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}},[
          div({style:{fontSize:12,color:'var(--text2)',background:'var(--bg)',padding:'3px 8px',borderRadius:4}},['💰 '+formatMoney(p.amount)]),
          div({style:{fontSize:12,color:'var(--text2)',background:'var(--bg)',padding:'3px 8px',borderRadius:4}},['🏢 '+(p.supplier||'—')]),
          div({style:{fontSize:12,color:'var(--text2)',background:'var(--bg)',padding:'3px 8px',borderRadius:4}},['👤 '+(p.proposer||'—')]),
          p.approver?div({style:{fontSize:12,color:'var(--text2)',background:'var(--bg)',padding:'3px 8px',borderRadius:4}},['✓ '+(p.approver||'—')]):null,
        ].filter(Boolean)),
        div({style:{fontSize:11,color:'var(--text3)'}},['🏦 '+(bank?bank.name:p.bankCode||'—')+' · '+p.accountNo+(p.accountName?' · '+p.accountName:'')]),
        div({style:{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}},[
          p.receiptFileId?div({style:{fontSize:11,color:'#0369a1',background:'#e0f2fe',border:'1px solid #bae6fd',borderRadius:4,padding:'2px 7px'}},['🧾 Ủy nhiệm chi']):null,
          (p.invoices&&p.invoices.length)?div({style:{fontSize:11,color:'#065f46',background:'#ecfdf5',border:'1px solid #a7f3d0',borderRadius:4,padding:'2px 7px'}},['📎 '+p.invoices.length+' hoá đơn']):null,
          (p.photoUrls&&p.photoUrls.length)?div({style:{fontSize:11,color:'#7c3aed',background:'#ede9fe',border:'1px solid #c4b5fd',borderRadius:4,padding:'2px 7px',cursor:'pointer'},onClick:(e)=>{e.stopPropagation();showPhotoLightbox(p.photoUrls);}},[`🖼 ${p.photoUrls.length} ảnh HĐ`]):null,
        ].filter(Boolean)),
      ]),
    ]);
    // Lưu reference đến content div để gắn click
    const contentDiv=card.querySelector('div[style*="flex:1"]');
    if(contentDiv)contentDiv.addEventListener('click',()=>openPaymentModal(p));
    wrap.appendChild(card);
  });
  return wrap;
}

      makeField('Số tài khoản *',[(()=>{

      makeField('Tên người thụ hưởng *',[(()=>{

        else savePayments(list.map(p=>p.id===saved.id?saved:p));
        showToast(cur.isNew?'✅ Đã tạo đề xuất!':'✅ Đã cập nhật!');
        // Sync Google Sheet
        syncToSheet(saved).catch(()=>{});
        // Notify Telegram
        const msgPrefix=cur.isNew?'💳 <b>Đề xuất thanh toán mới!</b>':(cur.status==='paid'?'✅ <b>Thanh toán đề xuất thành công!</b>':'🔄 <b>Cập nhật đề xuất thanh toán</b>');
        notifyPayment(saved,msgPrefix).catch(()=>{});
        // If new, also send QR + invoice images
        if(cur.isNew&&saved.bankCode&&saved.accountNo&&saved.amount){
          notifyPaymentWithQR(saved).catch(()=>{});

      // Preview existing invoices
      const invoices=form.invoices||[];
      const previewWrap=div({style:{display:'flex',flexWrap:'wrap',gap:8,marginBottom:invoices.length?10:0}},[]);
      invoices.forEach((inv,idx)=>{
        const isImg=/^data:image/.test(inv.data||'');
        const isPdf=/^data:application\/pdf/.test(inv.data||'');
        const thumb=div({style:{position:'relative',display:'inline-flex',flexDirection:'column',alignItems:'center',gap:3}},[]);
        if(isImg){
          const imgEl=el('img',{src:inv.data,style:{width:72,height:72,objectFit:'cover',borderRadius:6,border:'1px solid var(--border)',cursor:'pointer'}});

        } else {
          const icon=div({style:{width:72,height:72,borderRadius:6,border:'1px solid var(--border)',background:'#fff',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',fontSize:24,cursor:'pointer',gap:2}},[
            isPdf?'📄':'📎',

          ]);
          icon.addEventListener('click',()=>window.open(inv.data,'_blank'));
          thumb.appendChild(icon);
        }
        const delBtn=btn({style:{position:'absolute',top:-6,right:-6,width:18,height:18,borderRadius:'50%',background:'#dc2626',border:'none',color:'white',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',padding:0,lineHeight:1}},['×']);
        delBtn.addEventListener('click',()=>{
          const cur=S.modalData;
          const updated=(cur.invoices||[]).filter((_,i)=>i!==idx);
          S.modalData={...cur,invoices:updated};
          render();
        });
        thumb.appendChild(delBtn);
        previewWrap.appendChild(thumb);
      });
      if(invoices.length)sec.appendChild(previewWrap);

      // Upload button
      const fileInp=el('input',{type:'file',accept:'image/*,application/pdf',multiple:true,style:{display:'none'}});
      fileInp.addEventListener('change',async e=>{
        const files=[...e.target.files];
        if(!files.length)return;
        const cur=S.modalData;
        const existing=cur.invoices||[];
        const newInvs=await Promise.all(files.map(f=>new Promise(res=>{
          const reader=new FileReader();
          reader.onload=ev=>res({name:f.name,data:ev.target.result,uploadedAt:new Date().toISOString()});
          reader.readAsDataURL(f);
        })));
        S.modalData={...cur,invoices:[...existing,...newInvs]};
        // Auto-save invoices to payment list
        const list=getPayments();
        const idx2=list.findIndex(p=>p.id===cur.id);
        if(idx2>=0){list[idx2]={...list[idx2],invoices:[...existing,...newInvs]};lsSet('tt_payments',list);}
        render();
        showToast('📎 Đã thêm '+newInvs.length+' hoá đơn');
        // Send to Telegram
        const cfg4=getPayTgCfg();
        if(cfg4.token&&cfg4.chatId){
          const p4={...cur,invoices:[...existing,...newInvs]};
          const bank4=VIET_BANKS.find(b=>b.code===p4.bankCode);
          for(const inv of newInvs){
            const isImg4=/^data:image/.test(inv.data||'');
            const caption4='🧾 <b>Hoá đơn đề xuất</b> '+p4.code+'\n📝 '+p4.description+'\n💰 '+formatMoney(p4.amount)+'\n🏦 '+(bank4?bank4.name:p4.bankCode||'')+'\n📎 '+inv.name;
            try{
              const base64=inv.data.split(',')[1];
              const mime=inv.data.split(';')[0].slice(5);
              const fd=new FormData();
              fd.append('chat_id',cfg4.chatId);
              fd.append('caption',caption4);
              fd.append('parse_mode','HTML');
              const byteChars=atob(base64);
              const byteArr=new Uint8Array(byteChars.length);
              for(let j=0;j<byteChars.length;j++)byteArr[j]=byteChars.charCodeAt(j);
              const blob=new Blob([byteArr],{type:mime});
              fd.append(isImg4?'photo':'document',blob,inv.name||'invoice.jpg');
              await fetch('https://api.telegram.org/bot'+cfg4.token+'/'+(isImg4?'sendPhoto':'sendDocument'),{method:'POST',body:fd});
            }catch(e2){console.warn('TG invoice upload:',e2);}
          }
        }
      });
      const uploadBtn=btn({className:'btn btn-secondary',style:{fontSize:12,display:'flex',alignItems:'center',gap:5},onClick:()=>fileInp.click()},[
        '📎 Thêm hoá đơn',
        div({style:{fontSize:10,color:'var(--text3)',fontWeight:400}},['(ảnh / PDF)']),
      ]);
      sec.appendChild(fileInp);
      sec.appendChild(uploadBtn);
      if(invoices.length){
        sec.appendChild(div({style:{fontSize:11,color:'var(--text3)',marginTop:6}},['Đã có '+invoices.length+' hoá đơn — ảnh tự động gửi lên Telegram']));
      }
      // Insert before footer buttons
      const footerEl=modalEl.querySelector('[data-footer]');
      if(footerEl)modalEl.insertBefore(sec,footerEl);
      else modalEl.appendChild(sec);
  })();

  showModal(modalEl);
}


function renderPayTgCfgModal(){
  const cfg=getPayTgCfg();

  // Use local mutable object so inputs can update it before save
  const localCfg={token:cfg.token||'',chatId:cfg.chatId||'',accountantTg:cfg.accountantTg||'',sepayChatId:cfg.sepayChatId||'',sepayApiKey:cfg.sepayApiKey||''};

  const tokenInp=inp({className:'input',value:localCfg.token,placeholder:'Bot Token từ @BotFather',style:{fontFamily:'monospace',fontSize:12}});
  tokenInp.addEventListener('input',e=>{localCfg.token=e.target.value.trim();});

  const chatIdInp=inp({className:'input',value:localCfg.chatId,placeholder:'Chat ID hoặc Group ID'});
  chatIdInp.addEventListener('input',e=>{localCfg.chatId=e.target.value.trim();});

  const accInp=inp({className:'input',value:localCfg.accountantTg,placeholder:'username kế toán (không có @)'});
  accInp.addEventListener('input',e=>{localCfg.accountantTg=e.target.value.replace(/^@/,'').trim();});

  const sepayInp=inp({className:'input',value:localCfg.sepayChatId,placeholder:'Chat ID group có Sepay bot (nếu khác group trên)'});
  sepayInp.addEventListener('input',e=>{localCfg.sepayChatId=e.target.value.trim();});

  const sepayApiInp=inp({className:'input',value:localCfg.sepayApiKey,placeholder:'API Key từ app.sepay.vn → Cài đặt → API',style:{fontFamily:'monospace',fontSize:12}});
  sepayApiInp.addEventListener('input',e=>{localCfg.sepayApiKey=e.target.value.trim();});

  const errDiv=div({style:{fontSize:12,color:'#dc2626',marginTop:6,display:'none'}});
  const okDiv=div({style:{fontSize:12,color:'#065f46',fontWeight:600,marginTop:6,display:'none'}},['✅ Kết nối thành công!']);

  const doSave=()=>{
    if(!localCfg.token||!localCfg.chatId){
      errDiv.textContent='Nhập đủ Bot Token và Chat ID!';
      errDiv.style.display='block';
      return false;
    }
    savePayTgCfg({token:localCfg.token,chatId:localCfg.chatId,accountantTg:localCfg.accountantTg,sepayChatId:localCfg.sepayChatId,sepayApiKey:localCfg.sepayApiKey});
    return true;
  };

  const testBtn=btn({style:{padding:'8px 12px',borderRadius:8,border:'1.5px solid #e5e7eb',background:'white',fontSize:12,fontWeight:600,whiteSpace:'nowrap'},onClick:async()=>{
    if(!localCfg.token||!localCfg.chatId){errDiv.textContent='Nhập token và chat ID trước!';errDiv.style.display='block';return;}
    testBtn.textContent='...'; testBtn.disabled=true;
    try{
      await tgCall(localCfg.token,'sendMessage',{chat_id:localCfg.chatId,text:'✅ <b>Thanh toán Bot</b> đã kết nối với Task Tracker!',parse_mode:'HTML'});
      doSave();
      okDiv.style.display='block'; errDiv.style.display='none';
      testBtn.textContent='✓ OK'; testBtn.style.background='#ecfdf5'; testBtn.style.color='#065f46';
    }catch(e){
      errDiv.textContent='❌ '+e.message; errDiv.style.display='block';
      testBtn.textContent='Test'; testBtn.disabled=false;
    }
  }},['Test']);

  const modalEl=div({className:'modal'},[
    div({className:'modal-header'},[
      div({className:'modal-title'},['🤖 Kết nối Telegram — Thanh toán']),
      btn({className:'modal-close',onClick:()=>setState({modal:null})},['×']),
    ]),
    div({style:{background:'var(--bg)',borderRadius:'var(--r8)',padding:'10px 14px',marginBottom:12,border:'1px solid var(--border)',fontSize:12,color:'var(--text2)',lineHeight:1.7}},[
      div({},[span({style:{fontWeight:600}},['📋 Cách dùng: ']),span({},[' Bot gửi thông báo + QR khi tạo đề xuất mới.'])]),
      div({},[span({style:{fontWeight:600,color:'#d97706'}},['⚠️ Khuyến nghị: ']),span({},[' Dùng bot riêng cho Thanh toán để tránh xung đột.'])]),
    ]),
    makeField('Bot Token',[div({style:{display:'flex',gap:8}},[tokenInp])]),
    makeField('Chat ID / Group ID',[div({style:{display:'flex',gap:8}},[chatIdInp,testBtn])]),
    errDiv,okDiv,
    div({style:{background:'var(--bg)',borderRadius:'var(--r8)',padding:'12px 14px',marginTop:8,border:'1px solid var(--border)'}},[
      div({style:{fontSize:11,fontWeight:700,color:'var(--text2)',marginBottom:10,textTransform:'uppercase',letterSpacing:'.04em'}},['👥 Phân quyền (tùy chọn)']),
      makeField('📊 Username Kế toán (@username)',[
        accInp,
        div({style:{fontSize:11,color:'var(--text3)',marginTop:3}},['Nhận thông báo sau khi quản lý duyệt.']),
      ]),
    ]),
    div({style:{background:'#FFF9C4',borderRadius:'var(--r8)',padding:'12px 14px',marginTop:8,border:'1px solid #F9A825'}},[
      div({style:{fontSize:11,fontWeight:700,color:'#6D4C41',marginBottom:10,textTransform:'uppercase',letterSpacing:'.04em'}},['🔗 Sepay Integration']),
      makeField('🔑 Sepay API Key (khuyến nghị)',[
        sepayApiInp,
        div({style:{fontSize:11,color:'var(--text3)',marginTop:3}},['Vào app.sepay.vn → Cài đặt → Tích hợp → API. Tool sẽ tự poll Sepay mỗi 15s để xác nhận tiền ra.']),
      ]),
      makeField('Chat ID group Sepay (backup — nếu không dùng API)',[
        sepayInp,
        div({style:{fontSize:11,color:'var(--text3)',marginTop:3}},['Chỉ cần nếu không dùng Sepay API Key bên trên.']),
      ]),
    ]),
    div({style:{display:'flex',gap:8,paddingTop:'1rem',borderTop:'1px solid var(--border)'}},[
      localCfg.token?btn({className:'btn btn-danger',style:{fontSize:12},onClick:()=>{
        savePayTgCfg({token:'',chatId:'',accountantTg:''});
        setState({modal:null});
        showToast('🔌 Đã ngắt kết nối');
      }},['Ngắt']):null,
      btn({className:'btn btn-secondary',onClick:()=>setState({modal:null})},['Đóng']),
      btn({className:'btn btn-primary',style:{flex:1},onClick:()=>{
        if(doSave()){showToast('✅ Đã lưu!');setState({modal:null});}
      }},['Lưu']),
    ]),
  ]);

  showModal(modalEl);
}

// ─── Boot ────────────────────────────────────────────────────────────────────
render();
init();
</script>
</body>
</html>
